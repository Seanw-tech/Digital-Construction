<svg viewBox="0 0 1100 520" xmlns="http://www.w3.org/2000/svg" role="img" font-family="system-ui, sans-serif">
  <title>BIM Clash Coordination Workflow</title>
  <desc>Swimlane diagram showing Digital Engineering Team and Pre Construction Team responsibilities</desc>

  <!-- Background -->
  <rect width="1100" height="520" fill="#f8fafc"/>

  <!-- Swimlane backgrounds -->
  <rect x="0" y="60" width="1100" height="210" fill="#e0f2fe" opacity="0.5"/>
  <rect x="0" y="270" width="1100" height="210" fill="#fef3c7" opacity="0.5"/>

  <!-- Lane label backgrounds -->
  <rect x="0" y="60" width="140" height="210" fill="#0ea5e9" opacity="0.15"/>
  <rect x="0" y="270" width="140" height="210" fill="#f59e0b" opacity="0.15"/>

  <!-- Lane labels -->
  <text x="70" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="#0369a1">Digital</text>
  <text x="70" y="171" text-anchor="middle" font-size="12" font-weight="700" fill="#0369a1">Engineering</text>
  <text x="70" y="187" text-anchor="middle" font-size="12" font-weight="700" fill="#0369a1">Team</text>

  <text x="70" y="358" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Pre Construction</text>
  <text x="70" y="374" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Team</text>
  <text x="70" y="392" text-anchor="middle" font-size="11" fill="#92400e">(Structure &amp;</text>
  <text x="70" y="406" text-anchor="middle" font-size="11" fill="#92400e">Services)</text>

  <!-- Divider line between lanes -->
  <line x1="0" y1="270" x2="1100" y2="270" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6,4"/>
  <!-- Lane left border -->
  <line x1="140" y1="60" x2="140" y2="480" stroke="#94a3b8" stroke-width="1"/>

  <!-- Header bar -->
  <rect x="0" y="0" width="1100" height="60" fill="#1e3a5f"/>
  <text x="550" y="23" text-anchor="middle" font-size="15" font-weight="700" fill="white">BIM Clash Coordination Workflow</text>
  <text x="550" y="43" text-anchor="middle" font-size="11" fill="#93c5fd">Stage-gated T1&#x2013;T4 clash detection &#xB7; NZS4219:2009 &#xB7; Revizto</text>

  <!-- ===== DE TEAM BOXES ===== -->

  <!-- Step 1: Upload Matrix -->
  <rect x="155" y="90" width="135" height="72" rx="6" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="222" y="111" text-anchor="middle" font-size="10" font-weight="700" fill="#0369a1">&#x2460; Upload</text>
  <text x="222" y="125" text-anchor="middle" font-size="10" fill="#0369a1">Company Clash</text>
  <text x="222" y="139" text-anchor="middle" font-size="10" fill="#0369a1">Matrix</text>
  <text x="222" y="155" text-anchor="middle" font-size="9" fill="#64748b">Platform loads T1&#x2013;T4</text>

  <!-- Step 2: Run Prompt 01 -->
  <rect x="315" y="90" width="135" height="72" rx="6" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="382" y="111" text-anchor="middle" font-size="10" font-weight="700" fill="#0369a1">&#x2461; Run Prompt 01</text>
  <text x="382" y="125" text-anchor="middle" font-size="10" fill="#0369a1">Attach design report</text>
  <text x="382" y="139" text-anchor="middle" font-size="10" fill="#0369a1">AI outputs</text>
  <text x="382" y="155" text-anchor="middle" font-size="9" fill="#64748b">Gate Items CSV</text>

  <!-- Step 4: Attach Reviewed Excel -->
  <rect x="635" y="90" width="135" height="72" rx="6" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="702" y="108" text-anchor="middle" font-size="10" font-weight="700" fill="#0369a1">&#x2463; Attach Reviewed</text>
  <text x="702" y="122" text-anchor="middle" font-size="10" fill="#0369a1">Excel to same</text>
  <text x="702" y="136" text-anchor="middle" font-size="10" fill="#0369a1">AI session</text>
  <text x="702" y="152" text-anchor="middle" font-size="9" fill="#64748b">AI outputs JSON</text>

  <!-- Step 5: Upload JSON -->
  <rect x="795" y="90" width="135" height="72" rx="6" fill="#e0f2fe" stroke="#0ea5e9" stroke-width="1.5"/>
  <text x="862" y="108" text-anchor="middle" font-size="10" font-weight="700" fill="#0369a1">&#x2464; Upload JSON</text>
  <text x="862" y="122" text-anchor="middle" font-size="10" fill="#0369a1">&#x1F4CB; Updated Gate</text>
  <text x="862" y="136" text-anchor="middle" font-size="10" fill="#0369a1">Rules</text>
  <text x="862" y="152" text-anchor="middle" font-size="9" fill="#64748b">Gate checklist updated</text>

  <!-- Step 6: Work through gates -->
  <rect x="955" y="90" width="135" height="72" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="1.5"/>
  <text x="1022" y="108" text-anchor="middle" font-size="10" font-weight="700" fill="#065f46">&#x2465; Work T1&#x2192;T4</text>
  <text x="1022" y="122" text-anchor="middle" font-size="10" fill="#065f46">Complete gate</text>
  <text x="1022" y="136" text-anchor="middle" font-size="10" fill="#065f46">checklists</text>
  <text x="1022" y="152" text-anchor="middle" font-size="9" fill="#64748b">Export CSV &#x2192; Revizto</text>

  <!-- ===== PRE-CON BOXES ===== -->

  <!-- Step 3: Receive & Review -->
  <rect x="315" y="300" width="135" height="72" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="382" y="318" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">&#x2462; Receive &amp; Review</text>
  <text x="382" y="332" text-anchor="middle" font-size="10" fill="#92400e">Gate Items Excel</text>
  <text x="382" y="346" text-anchor="middle" font-size="10" fill="#92400e">Fill YES/NO/N/A</text>
  <text x="382" y="362" text-anchor="middle" font-size="9" fill="#64748b">Add comments + sign off</text>

  <!-- Return box -->
  <rect x="475" y="300" width="135" height="72" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="542" y="318" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">Return</text>
  <text x="542" y="332" text-anchor="middle" font-size="10" fill="#92400e">Completed</text>
  <text x="542" y="346" text-anchor="middle" font-size="10" fill="#92400e">Excel</text>
  <text x="542" y="362" text-anchor="middle" font-size="9" fill="#64748b">to DE Team</text>

  <!-- ===== ARROWS ===== -->
  <defs>
    <marker id="arrBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#0369a1"/>
    </marker>
    <marker id="arrAmber" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#92400e"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#059669"/>
    </marker>
  </defs>

  <!-- 1 -> 2 (DE horizontal) -->
  <line x1="290" y1="126" x2="315" y2="126" stroke="#0369a1" stroke-width="1.5" marker-end="url(#arrBlue)"/>

  <!-- 2 -> Pre-Con Step 3 (handoff down) -->
  <line x1="382" y1="162" x2="382" y2="300" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrAmber)"/>

  <!-- Pre-Con: 3 -> Return -->
  <line x1="450" y1="336" x2="475" y2="336" stroke="#92400e" stroke-width="1.5" marker-end="url(#arrAmber)"/>

  <!-- Return -> Step 4 (handoff up, angled) -->
  <polyline points="542,300 542,210 635,126" fill="none" stroke="#0369a1" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrBlue)"/>

  <!-- 4 -> 5 (DE horizontal) -->
  <line x1="770" y1="126" x2="795" y2="126" stroke="#0369a1" stroke-width="1.5" marker-end="url(#arrBlue)"/>

  <!-- 5 -> 6 (DE horizontal) -->
  <line x1="930" y1="126" x2="955" y2="126" stroke="#059669" stroke-width="1.5" marker-end="url(#arrGreen)"/>

  <!-- Handoff labels -->
  <rect x="343" y="216" width="90" height="18" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-width="0.5"/>
  <text x="388" y="228" text-anchor="middle" font-size="9" fill="#92400e">Send CSV/Excel &#x2193;</text>

  <rect x="548" y="226" width="96" height="18" rx="3" fill="#dbeafe" stroke="#0ea5e9" stroke-width="0.5"/>
  <text x="596" y="238" text-anchor="middle" font-size="9" fill="#0369a1">Return reviewed &#x2191;</text>

  <!-- ===== FOOTER ===== -->
  <rect x="0" y="480" width="1100" height="40" fill="#f1f5f9"/>
  <text x="550" y="497" text-anchor="middle" font-size="10" fill="#64748b">Platform: Clash_Coordination_Platform.html &#xB7; Prompts: 01_ProjectReport_ClashGate_Analysis.md</text>
  <text x="550" y="513" text-anchor="middle" font-size="10" fill="#64748b">AI: Claude / Copilot / ChatGPT &#xB7; Output: JSON &#x2192; Updated Gate Rules &#xB7; v2.0</text>
</svg>
